<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./css/styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1 id="form-title" class="title">Understanding A11y in Forms</h1>

    <p id="description">
      Please let us know how we can support you with a11y issues.
    </p>

    <form aria-labelledby="form-title">
      <fieldset aria-describedby="description">
        <legend>Enter your information</legend>

        <label for="name-input">Name:</label>
        <input id="name-input" type="text" name="name" />

        <label for="age-input">Age:</label>
        <input id="age-input" type="number" name="age" />

        <label for="color-input">Color you cannot see:</label>
        <input id="color-input" type="color" name="color" />

        <label for="message-input">Leave us a message:</label>
        <textarea id="message-input" name="message" rows="7"></textarea>

        <button type="submit">Submit</button>
      </fieldset>
    </form>
  </body>
</html>
